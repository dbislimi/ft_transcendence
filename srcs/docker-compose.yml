services:
  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "8443:443"
      # - "8000:80"
      # - "9090:8080"
    volumes:
      - ./certs:/etc/nginx/ssl:ro
    env_file:
      - ./backend/app/.env
    environment:
      - VITE_PORT=4173
    depends_on:
      - front
      - back
    restart: unless-stopped

  back:
    build: ./backend
    container_name: api
    volumes:
      - ../AI:/usr/AI
      - ./certs:/usr/certs
      - ./backend/app/data:/usr/app/data
      - ./backend/app/public/avatars/custom:/usr/app/dist/public/avatars/custom
    env_file:
      - ./backend/app/.env
    expose:
      - "3001"
    restart: unless-stopped
  
  front:
    build: ./frontend
    container_name: front
    volumes:
      - ./certs:/usr/certs
    env_file:
      - ./backend/app/.env
    environment:
      - VITE_HOSTNAME=${HOSTNAME:-localhost}
    expose:
      - "4173"
    depends_on:
      - back
    restart: unless-stopped

volumes:
  db_data:
