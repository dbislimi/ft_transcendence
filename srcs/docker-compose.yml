services:
  back:
    build: ./backend
    container_name: fastify
    volumes:
      - ./backend/app:/usr/app
      - /usr/app/node_modules
    ports:
      - 3000:3000
    expose:
      - 3000
  front:
    build: ./frontend
    container_name: front
    volumes:
      - ./frontend/app:/usr/app
      - /usr/app/node_modules
    ports:
      - 5173:5173
    depends_on:
      - back