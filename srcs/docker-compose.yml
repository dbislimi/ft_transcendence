services:
  back:
    build: ./backend
    container_name: api
    working_dir: /usr/app
    entrypoint: ["sh", "-c"]
    command: ["npm run dev"]
    volumes:
      - ../AI:/usr/AI
      - ./backend/app:/usr/app
      - ./shared:/usr/shared
      - /usr/app/node_modules
    env_file:
      - ./backend/app/.env
    ports:
      - "3001:3001"
    restart: unless-stopped
  
  adminer:
    image: adminer:latest
    container_name: db_admin
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=sqlite
    volumes:
      - ./backend/app/data:/var/www/html/data
    restart: unless-stopped
    depends_on:
      - back
  
  front:
    build: ./frontend
    container_name: front
    working_dir: /usr/app
    entrypoint: ["sh", "-c"]
    command: ["npm run dev"]
    volumes:
      - ./frontend/app:/usr/app
      - ./shared:/usr/shared
      - /usr/app/node_modules
    ports:
      - 5173:5173
    depends_on:
      - back
    restart: unless-stopped
  