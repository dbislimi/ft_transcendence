services:
  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "8443:443"
    volumes:
      - ./certs:/etc/nginx/ssl:ro
    env_file:
      - .env
    environment:
      - VITE_PORT=5173
    depends_on:
      front:
        condition: service_healthy
      back:
        condition: service_healthy
    restart: "no"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:443"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  back:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: api
    working_dir: /usr/app
    volumes:
      - ./backend/app:/usr/app
      - ./certs:/usr/certs
      - ./backend/app/data:/usr/app/data
      - ./backend/app/public/avatars/custom:/usr/app/public/avatars/custom
      - /usr/app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    expose:
      - "3001"
    restart: "no"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
  
  adminer:
    image: adminer:latest
    container_name: db_admin
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=sqlite
    volumes:
      - ./backend/app/data:/var/www/html/data
    restart: "no"
    depends_on:
      - back
  
  front:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: front
    working_dir: /usr/app
    volumes:
      - ./frontend/app:/usr/app
      - ./certs:/usr/certs
      - /usr/app/node_modules
    env_file:
      - .env
    environment:
      - VITE_HOSTNAME=${HOSTNAME:-localhost}
    expose:
      - "5173"
    depends_on:
      back:
        condition: service_healthy
    restart: "no"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  db_data:
