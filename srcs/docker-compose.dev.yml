services:
  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "8443:443"
    volumes:
      - ./certs:/etc/nginx/ssl:ro
    env_file:
      - ./backend/app/.env
    environment:
      - VITE_PORT=5173
    depends_on:
      - front
      - back
    restart: unless-stopped

  back:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: api
    working_dir: /usr/app
    volumes:
      - ../AI:/usr/AI
      - ./backend/app:/usr/app
      - ./certs:/usr/certs
      - db_data:/usr/app/data
      - ./backend/app/public/avatars/custom:/usr/app/public/avatars/custom
      - /usr/app/node_modules
    env_file:
      - ./backend/app/.env
    expose:
      - "3001"
    restart: unless-stopped
  
  adminer:
    image: adminer:latest
    container_name: db_admin
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=sqlite
    volumes:
      - db_data:/var/www/html/data
    restart: unless-stopped
    depends_on:
      - back
  
  front:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: front
    working_dir: /usr/app
    volumes:
      - ./frontend/app:/usr/app
      - ./certs:/usr/certs
      - /usr/app/node_modules
    env_file:
      - ./backend/app/.env
    environment:
      - VITE_HOSTNAME=${HOSTNAME:-localhost}
    expose:
      - "5173"
    depends_on:
      - back
    restart: unless-stopped

volumes:
  db_data:
